# From https://marcus.se.net/obsidian-plugin-docs/publishing/release-your-plugin-with-github-actions

name: Release Obsidian plugin
permissions:
  contents: write

on:
  push:
    tags:
      - "*.*.*"

env:
  PLUGIN_NAME: md-writer

jobs:
  check:
    uses: ./.github/workflows/check.yml

  validate-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "true"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate release tag and metadata
        run: node ./scripts/validate-release-tag.mjs "${{ github.ref_name }}"

  build:
    runs-on: ubuntu-latest
    needs:
      - check
      - validate-release

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "true"
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Build
        run: |
          pnpm install --frozen-lockfile
          pnpm run ci
          mkdir ${{ env.PLUGIN_NAME }}
          cp -r dist/* ${{ env.PLUGIN_NAME }}
          zip -r ${{ env.PLUGIN_NAME }}.zip ${{ env.PLUGIN_NAME }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref, '-') }}
          body_path: ./dist/release-notes.md
          files: |
            ${{ env.PLUGIN_NAME }}.zip
            dist/main.js
            dist/manifest.json
            dist/styles.css
