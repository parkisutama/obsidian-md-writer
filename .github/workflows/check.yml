name: Check

on:
  push:
    branches:
      - "**"
  workflow_call:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "true"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Check
        run: |
          pnpm install --frozen-lockfile
          pnpm run check:ci
